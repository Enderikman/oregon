# Central ontology definition.
# Entity types and their frontmatter fields. Body content is free-form prose generated by the LLM.
# Frontmatter fields are structural — used for filtering and traversal, not for content.

entities:
  Person:
    frontmatter:
      - name
      - department
      - is_external
      - reports_to

  Organization:
    frontmatter:
      - name
      - relationship    # client | vendor

  Product:
    frontmatter:
      - name

  Ticket:
    frontmatter: []

  Repository:
    frontmatter:
      - name

  Knowledge:
    frontmatter:
      - title

communications:
  - email
  - conversation
  - support_chat
