services:
  backend:
    build:
      context: ./backend
    container_name: oregon-backend
    ports:
      - "3000:3000"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - EMBED_MODEL=${EMBED_MODEL:-gemini-embedding-001}
      - EMBED_ENDPOINT=${EMBED_ENDPOINT:-}
      - INGEST_DATA_DIR=${INGEST_DATA_DIR:-/dataset/EnterpriseBench}
      - OUTPUT_DIR=${OUTPUT_DIR:-/data/EnterpriseBench}
      - INGEST_ON_STARTUP=${INGEST_ON_STARTUP:-true}
    volumes:
      - ./data:/data
      - ./dataset:/dataset:ro
    networks:
      - oregon-net

  voice-agent:
    build:
      context: ./backend
    container_name: oregon-voice-agent
    command: ["python3", "-m", "uvicorn", "src.voice_agent.main:app", "--host", "0.0.0.0", "--port", "8001"]
    ports:
      - "8001:8001"
    environment:
      - GRADIUM_API_KEY=${GRADIUM_API_KEY:-}
      - GRADIUM_VOICE_ID=${GRADIUM_VOICE_ID:-}
      - GRADIUM_MODEL=${GRADIUM_MODEL:-default}
    networks:
      - oregon-net

  frontend:
    build:
      context: ./frontend
    container_name: oregon-frontend
    ports:
      - "4321:4321"
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:3000}
      - VITE_OPENROUTER_API_KEY=${VITE_OPENROUTER_API_KEY:-}
      - VITE_OPENROUTER_MODEL=${VITE_OPENROUTER_MODEL:-openai/gpt-4o-mini}
      - VITE_VOICE_AGENT_URL=${VITE_VOICE_AGENT_URL:-http://localhost:8001}
    depends_on:
      - backend
      - voice-agent
    networks:
      - oregon-net

networks:
  oregon-net:
    driver: bridge
